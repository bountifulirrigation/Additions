<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Additions</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
    #appContainer { max-width:700px; margin:50px auto; background:#fff; padding:30px 40px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.08); }
    h1 { text-align:center; font-size:32px; color:#222; margin-bottom:30px; }
    .form-row { display:flex; flex-wrap:wrap; margin-top:15px; align-items:center; }
    .form-row label { flex:1 0 140px; font-weight:600; color:#333; }
    .form-row input, .form-row textarea { flex:2 0 300px; padding:8px 12px; font-size:14px; border-radius:5px; border:1px solid #ccc; background:#fafafa; color:#222; resize:none; }
    input[readonly], textarea[readonly] { background-color:#f0f0f0; color:#555; border:1px solid #ccc; }
    textarea { line-height:1.4; }
    #priorsContainer, #otherDescDiv, #specialNoDiv, #groupOwnerRow, #submitConfirmRow { display:none; }
    #submitBtn { margin-top:20px; padding:12px 20px; font-size:16px; cursor:pointer; display:block; margin-left:auto; margin-right:auto; border-radius:6px; border:none; background-color:#4CAF50; color:white; transition: background-color 0.3s ease; }
    #submitBtn:hover { background-color:#45a049; }
    #status { margin-top:18px; font-weight:bold; color:#333; text-align:center; }
    #submitConfirmRow { display:flex; justify-content:center; gap:20px; margin-top:15px; }
    #submitConfirmRow button { padding:6px 14px; font-size:14px; border-radius:5px; border:none; cursor:pointer; }
    #submitConfirmRow button.yes { background-color:#4CAF50; color:white; }
    #submitConfirmRow button.no { background-color:#f44336; color:white; }
  </style>
</head>
<body>

<div id="appContainer">
  <h1>Additions</h1>

  <div class="form-row">
    <label for="parcelInput">Parcel Number:</label>
    <input id="parcelInput" placeholder="Enter Parcel Number" />
  </div>

  <div id="parcelFields">
    <div class="form-row"><label for="ownerName">Owner Name:</label><input id="ownerName" readonly /></div>
    <div class="form-row"><label for="ownerAddress">Owner Address:</label><textarea id="ownerAddress" rows="3" readonly></textarea></div>
    <div class="form-row"><label for="ownerCity">City:</label><input id="ownerCity" readonly /></div>
    <div class="form-row"><label for="ownerState">State:</label><input id="ownerState" readonly /></div>
    <div class="form-row"><label for="ownerZip">ZIP:</label><input id="ownerZip" readonly /></div>
    <div class="form-row"><label for="Address">Address:</label><input id="Address" readonly /></div>
    <div class="form-row"><label for="acreage">Acreage:</label><input id="acreage" readonly /></div>
    <div class="form-row"><label for="assessable">Assessable:</label><input id="assessable" /></div>
    <div class="form-row"><label for="acreFtWater">Acre Ft of Water:</label><input id="acreFtWater" readonly /></div>
    <div class="form-row"><label for="parcelStatus">Parcel Status:</label><input id="parcelStatus" /></div>
    <div class="form-row"><label for="Status">Status:</label><input id="Status" /></div>
    <div class="form-row"><label for="activity">Activity:</label><input id="activity" readonly /></div>
    <div class="form-row"><label for="discountMultiplier">Discount Multiplier:</label><input id="discountMultiplier" /></div>
    <div class="form-row"><label for="services">Services:</label><input id="services" /></div>
    <div class="form-row"><label for="group_">Group:</label><input id="group_" /></div>
    <div class="form-row" id="groupOwnerRow"><label for="groupOwner">Group Owner:</label><input id="groupOwner" readonly /></div>
    <div class="form-row" id="priorsContainer"><label for="priors">Priors:</label><input id="priors" placeholder="e.g., 12345,12347-12350" /></div>
    <div class="form-row" id="otherDescDiv"><label>Other_Desc:</label><input id="otherDesc" readonly /></div>
    <div class="form-row" id="specialNoDiv"><label>Special_No:</label><input id="specialNo" readonly /></div>

    <!-- hidden fields -->
    <input type="hidden" id="HOUSE_NO" />
    <input type="hidden" id="STREET_NAME" />
    <input type="hidden" id="Processed" value="NO" />

    <div id="submitConfirmRow">
      <button class="yes">Yes</button>
      <button class="no">No</button>
    </div>

    <button id="submitBtn">Submit Parcel</button>
  </div>

  <div id="status"></div>
</div>

<script>
require([
  "esri/identity/OAuthInfo",
  "esri/identity/IdentityManager",
  "esri/request"
], function (OAuthInfo, esriId, esriRequest) {

  const oauthInfo = new OAuthInfo({
    appId: "LYyDkVlqS7vIWtgK",
    portalUrl: "https://bwsd.maps.arcgis.com",
    popup: false,
    redirectUri: "https://bountifulirrigation.github.io/Additions/"
  });

  esriId.registerOAuthInfos([oauthInfo]);

  esriId.checkSignInStatus(oauthInfo.portalUrl + "/sharing")
    .then(startApp)
    .catch(() =>
      esriId.getCredential(oauthInfo.portalUrl + "/sharing").then(startApp)
    );

  function startApp() {

    const layerAUrl = "https://services3.arcgis.com/qACnxJSsTspwubRv/arcgis/rest/services/service_f6d0b40f569c4851b2227f1f41e55aba/FeatureServer/0";
    const layerBUrl = "https://services3.arcgis.com/qACnxJSsTspwubRv/arcgis/rest/services/Assessment_Parcels/FeatureServer/0";

    const parcelInput = document.getElementById("parcelInput");
    const parcelFields = document.getElementById("parcelFields");
    const status = document.getElementById("status");

    const ownerName = document.getElementById("ownerName");
    const ownerAddress = document.getElementById("ownerAddress");
    const ownerCity = document.getElementById("ownerCity");
    const ownerState = document.getElementById("ownerState");
    const ownerZip = document.getElementById("ownerZip");
    const acreage = document.getElementById("acreage");
    const assessable = document.getElementById("assessable");
    const acreFtWater = document.getElementById("acreFtWater");
    const parcelStatus = document.getElementById("parcelStatus");
    const activity = document.getElementById("activity");
    const discountMultiplier = document.getElementById("discountMultiplier");
    const services = document.getElementById("services");
    const group_ = document.getElementById("group_");
    const groupOwner = document.getElementById("groupOwner");
    const priors = document.getElementById("priors");
    const otherDesc = document.getElementById("otherDesc");
    const specialNo = document.getElementById("specialNo");
    const address = document.getElementById("address");
    const statusField = document.getElementById("statusField");

    let houseNo = "";
    let streetName = "";

    parcelFields.style.display = "none";

    // lookup parcel
    async function lookupParcel() {

      const parcel = parcelInput.value.trim();
      if (!parcel) return;

      status.innerHTML = "Searching...";

      const respB = await esriRequest(layerBUrl + "/query", {
        method: "post",
        query: {
          f: "json",
          where: `ParcelTaxID+0=${parseInt(parcel)}`,
          outFields: "*",
          returnGeometry: false
        }
      });

      if (!respB.data.features.length) {
        status.innerHTML = "Parcel not found";
        return;
      }

      const b = respB.data.features[0].attributes;

      ownerName.value = b.ParcelOwnerName || "";

      ownerAddress.value = [
        b.ParcelOwnerMailAddressLine1,
        b.ParcelOwnerMailAddressLine2,
        b.ParcelOwnerMailAddressLine3
      ].filter(Boolean).join("\n");

      ownerCity.value = b.ParcelOwnerMailCity || "";
      ownerState.value = b.ParcelOwnerMailState || "";
      ownerZip.value = b.ParcelOwnerMailZipcode || "";

      acreage.value = b.ParcelAcreage || "";
      assessable.value = b.ParcelAcreage || "";

      acreFtWater.value = b.ParcelAcreage
        ? (b.ParcelAcreage * 2.9).toFixed(2)
        : "";

      address.value = b.ParcelFullSitusAddress || "";

      // hidden values
      houseNo = `${b.ParcelSitusNumber || ""} ${b.ParcelSitusPreDirections || ""}`.trim();
      streetName = `${b.ParcelSitusStreetName || ""} ${b.ParcelSitusStreetType || ""}`.trim();

      parcelStatus.value = "Active";
      activity.value = "NEW" + new Date().getFullYear().toString().slice(-2);
      discountMultiplier.value = 1;
      services.value = 1;
      group_.value = 100;

      parcelFields.style.display = "block";
      status.innerHTML = "Parcel found";
    }

    parcelInput.addEventListener("blur", lookupParcel);
    parcelInput.addEventListener("keydown", e => {
      if (e.key === "Enter") lookupParcel();
    });

    // dynamic Acre Ft Water update
    assessable.addEventListener("input", () => {
      const val = parseFloat(assessable.value);
      acreFtWater.value = isNaN(val) ? "" : (val * 2.9).toFixed(2);
    });

    // submit
    document.getElementById("submitYes").addEventListener("click", async () => {

      const attrs = {
        TAX_SER_NO: parcelInput.value,
        Parcel_Status: parcelStatus.value,
        STATUS: statusField.value,
        ACTIVITY: activity.value,

        Owner_Name: ownerName.value,
        Owner_Address: ownerAddress.value,
        OWNER_CITY: ownerCity.value,
        OWNER_STAT: ownerState.value,
        OWNER_ZIP: ownerZip.value,

        Address: address.value,

        Acreage: acreage.value,
        ASSESSABLE: assessable.value,
        Acre_ft_Water: acreFtWater.value,

        Discount_Multiplier: discountMultiplier.value,
        SERVICE_S_: services.value,
        GROUP_: group_.value,
        group_owner: groupOwner.value,

        PRIORS: priors.value,
        OTHER_DESC: otherDesc.value,
        SPECIAL_NO: specialNo.value,

        HOUSE_NO: houseNo,
        STREET_NAM: streetName,

        Processed: "NO"   // ✅ FIXED (string)
      };

      try {

        await esriRequest(layerAUrl + "/addFeatures", {
          method: "post",
          query: {
            f: "json",
            features: JSON.stringify([{ attributes: attrs }])
          },
          responseType: "json"
        });

        status.innerHTML = "Parcel submitted successfully!";
      } catch (err) {
        console.error(err);
        status.innerHTML = "Error submitting parcel";
      }

    });

  }
});
</script>
</body>
</html>
