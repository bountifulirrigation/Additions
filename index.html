<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Additions</title>

<link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css"/>
<script src="https://js.arcgis.com/4.29/"></script>

<style>
body{
  font-family:Segoe UI, sans-serif;
  background:#f0f2f5;
}
#appContainer{
  max-width:700px;
  margin:40px auto;
  background:#fff;
  padding:30px 40px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}
h1{text-align:center;margin-bottom:25px;}
.form-row{display:flex;margin-top:12px;align-items:center;}
.form-row label{flex:1 0 140px;font-weight:600;}
.form-row input, textarea{
  flex:2 0 300px;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  background:#fafafa;
}
textarea{resize:none;}
input[readonly],textarea[readonly]{background:#eee;}
#confirmRow{display:none;margin-top:20px;text-align:center;}
button{
  margin-top:20px;
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:6px;
  background:#4CAF50;
  color:#fff;
  cursor:pointer;
  display:block;
  margin-left:auto;
  margin-right:auto;
}
#status{text-align:center;margin-top:15px;font-weight:bold;}
</style>
</head>
<body>

<div id="appContainer">
<h1>Additions</h1>

<div class="form-row">
<label>Parcel Number:</label>
<input id="parcelInput" placeholder="Enter Parcel Number"/>
</div>

<div id="parcelFields" style="display:none">

<div class="form-row"><label>Owner Name:</label><input id="ownerName" readonly/></div>
<div class="form-row"><label>Owner Address:</label><textarea id="ownerAddress" rows="3" readonly></textarea></div>
<div class="form-row"><label>City:</label><input id="ownerCity" readonly/></div>
<div class="form-row"><label>State:</label><input id="ownerState" readonly/></div>
<div class="form-row"><label>ZIP:</label><input id="ownerZip" readonly/></div>

<div class="form-row"><label>Address:</label><input id="address" readonly/></div>

<div class="form-row"><label>Acreage:</label><input id="acreage" readonly/></div>
<div class="form-row"><label>Assessable:</label><input id="assessable"/></div>
<div class="form-row"><label>Acre Ft Water:</label><input id="acreFtWater" readonly/></div>

<div class="form-row"><label>Parcel Status:</label><input id="parcelStatus"/></div>
<div class="form-row"><label>Status:</label><input id="statusField"/></div>
<div class="form-row"><label>Activity:</label><input id="activity" readonly/></div>

<div class="form-row"><label>Discount Multiplier:</label><input id="discountMultiplier"/></div>
<div class="form-row"><label>Services:</label><input id="services"/></div>
<div class="form-row"><label>Group:</label><input id="group_"/></div>

<div class="form-row" id="groupOwnerRow" style="display:none">
<label>Group Owner:</label><input id="groupOwner"/>
</div>

<div class="form-row"><label>Priors:</label><input id="priors"/></div>
<div class="form-row"><label>Other Desc:</label><input id="otherDesc" readonly/></div>
<div class="form-row"><label>Special No:</label><input id="specialNo" readonly/></div>

<button id="submitBtn">Submit Parcel</button>

<div id="confirmRow">
<p><strong>Submit this parcel?</strong></p>
<button id="submitYes">YES</button>
<button id="submitNo">NO</button>
</div>

</div>

<div id="status"></div>
</div>

<script>
require([
"esri/identity/OAuthInfo",
"esri/identity/IdentityManager",
"esri/request"
], function(OAuthInfo, esriId, esriRequest){

const oauthInfo = new OAuthInfo({
  appId:"LYyDkVlqS7vIWtgK",
  portalUrl:"https://bwsd.maps.arcgis.com",
  popup:false,
  redirectUri:"https://bountifulirrigation.github.io/Additions/"
});
esriId.registerOAuthInfos([oauthInfo]);

esriId.checkSignInStatus(oauthInfo.portalUrl+"/sharing")
.then(startApp)
.catch(()=>esriId.getCredential(oauthInfo.portalUrl+"/sharing").then(startApp));

function startApp(){

const layerA="https://services3.arcgis.com/qACnxJSsTspwubRv/arcgis/rest/services/service_f6d0b40f569c4851b2227f1f41e55aba/FeatureServer/0";
const layerB="https://services3.arcgis.com/qACnxJSsTspwubRv/arcgis/rest/services/Assessment_Parcels/FeatureServer/0";

const parcelInput=document.getElementById("parcelInput");
const fields=document.getElementById("parcelFields");
const status=document.getElementById("status");

let houseNo="", streetName="";

parcelInput.addEventListener("blur",lookup);
parcelInput.addEventListener("keydown",e=>{if(e.key==="Enter")lookup();});

async function lookup(){
const parcel=parcelInput.value.trim();
if(!parcel) return;

status.innerHTML="Searching...";

try{
const res=await esriRequest(layerB+"/query",{
method:"post",
query:{f:"json",where:`ParcelTaxID+0=${parseInt(parcel)}`,outFields:"*",returnGeometry:false}
});

if(!res.data.features.length){status.innerHTML="Parcel not found";return;}

const b=res.data.features[0].attributes;

ownerName.value=b.ParcelOwnerName||"";
ownerAddress.value=[b.ParcelOwnerMailAddressLine1,b.ParcelOwnerMailAddressLine2,b.ParcelOwnerMailAddressLine3].filter(Boolean).join("\n");
ownerCity.value=b.ParcelOwnerMailCity||"";
ownerState.value=b.ParcelOwnerMailState||"";
ownerZip.value=b.ParcelOwnerMailZipcode||"";

address.value=b.ParcelFullSitusAddress||"";

acreage.value=b.ParcelAcreage||"";
assessable.value=b.ParcelAcreage||"";
acreFtWater.value=(b.ParcelAcreage*2.9).toFixed(2);

houseNo=`${b.ParcelSitusNumber||""} ${b.ParcelSitusPreDirections||""}`.trim();
streetName=`${b.ParcelSitusStreetName||""} ${b.ParcelSitusStreetType||""}`.trim();

parcelStatus.value="Active";
statusField.value="";
activity.value="NEW"+new Date().getFullYear().toString().slice(-2);
discountMultiplier.value=1;
services.value=1;
group_.value=100;

fields.style.display="block";
status.innerHTML="Parcel found";
}catch(e){
console.error(e);
status.innerHTML="Lookup error";
}
}

assessable.addEventListener("input",()=>{
const v=parseFloat(assessable.value);
acreFtWater.value=isNaN(v)?"":(v*2.9).toFixed(2);
});

group_.addEventListener("input",()=>{
groupOwnerRow.style.display=(parseInt(group_.value)!==100)?"flex":"none";
});

submitBtn.onclick=()=>confirmRow.style.display="block";
submitNo.onclick=()=>confirmRow.style.display="none";

submitYes.onclick=async()=>{
confirmRow.style.display="none";

const attrs={
TAX_SER_NO:parcelInput.value,
Parcel_Status:parcelStatus.value,
STATUS:statusField.value,
ACTIVITY:activity.value,
Owner_Name:ownerName.value,
Owner_Address:ownerAddress.value,
OWNER_CITY:ownerCity.value,
OWNER_STAT:ownerState.value,
OWNER_ZIP:ownerZip.value,
Address:address.value,
Acreage:acreage.value,
ASSESSABLE:assessable.value,
Acre_ft_Water:acreFtWater.value,
Discount_Multiplier:discountMultiplier.value,
SERVICE_S_:services.value,
GROUP_:group_.value,
group_owner:groupOwner.value,
PRIORS:priors.value,
OTHER_DESC:otherDesc.value,
SPECIAL_NO:specialNo.value,
HOUSE_NO:houseNo,
STREET_NAM:streetName,
Processed:"NO"
};

try{
await esriRequest(layerA+"/addFeatures",{
method:"post",
query:{f:"json",features:JSON.stringify([{attributes:attrs}])}
});
status.innerHTML="Submitted successfully!";
}catch(e){
console.error(e);
status.innerHTML="Submission failed";
}
};

}
});
</script>
</body>
</html>
