<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OAuth Callback</title>
  <script src="https://js.arcgis.com/4.29/"></script>
  <script>
    require(["esri/identity/IdentityManager"], function (IdentityManager) {
      // Pass the OAuth response to the opener (your app) so it can finish sign-in
      if (window.opener && !window.opener.closed) {
        window.opener.require(["esri/identity/IdentityManager"], function (OpenerId) {
          OpenerId.setOAuthResponseHash(window.location.hash || window.location.search);
          window.close();
        });
      } else {
        document.body.innerText = "No opener window found. Can't complete sign-in.";
      }
    });
  </script>
</head>
<body></body>
</html>
