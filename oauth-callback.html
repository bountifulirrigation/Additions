<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OAuth Callback</title>
  <script>
    (function () {
      var href = window.location.href;

      function closeSoon() {
        // Give the opener a tick to settle after completing OAuth
        setTimeout(function(){ window.close(); }, 250);
      }

      // ---- Path A: Use the opener's ArcGIS loader (preferred) ----
      try {
        if (window.opener && !window.opener.closed && window.opener.require) {
          window.opener.require(["esri/identity/IdentityManager"], function (IdManager) {
            try { IdManager.completeOAuth2(href); } catch(e) { console.error("completeOAuth2 via opener failed:", e); }
            closeSoon();
          });
          return; // Done via opener
        }
      } catch (e) {
        console.warn("Opener path not available:", e);
      }

      // ---- Path B: Load ArcGIS API in this popup, then complete ----
      function loadArcGisAndComplete() {
        try {
          require(["esri/identity/IdentityManager"], function (IdManager) {
            try { IdManager.completeOAuth2(href); } catch(e) { console.error("completeOAuth2 in popup failed:", e); }
            closeSoon();
          });
        } catch (e) {
          console.error("Require call in popup failed:", e);
          // Fallback to Path C
          postBackAndClose();
        }
      }

      function injectArcGisScriptAndRun() {
        var s = document.createElement("script");
        s.src = "https://js.arcgis.com/4.29/";
        s.onload = loadArcGisAndComplete;
        s.onerror = function(){
          console.error("Failed to load ArcGIS API in callback popup.");
          postBackAndClose();
        };
        document.head.appendChild(s);
      }

      // ---- Path C: Post the URL back to opener as a last resort ----
      function postBackAndClose() {
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage({ type: "arcgis:oauth-response", url: href }, "*");
          }
        } catch (_e) {}
        closeSoon();
      }

      // If opener path isn't usable, try loading the API in the popup.
      injectArcGisScriptAndRun();
    })();
  </script>
</head>
<body></body>
</html>
