<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OAuth Callback</title>
  <script>
    (function () {
      try {
        var href = window.location.href;
        // Call into the opener's ArcGIS IdentityManager to complete OAuth
        window.opener.require(["esri/identity/IdentityManager"], function (IdManager) {
          // This resolves the getCredential() promise in your main page
          IdManager.completeOAuth2(href);
          window.close();
        });
      } catch (e) {
        // If something goes wrong, leave a clue in the console
        console.error("OAuth callback error:", e);
      }
    })();
  </script>
</head>
<body></body>
</html>
